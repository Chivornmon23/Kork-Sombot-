<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./sign_up.css">
    <link href="https://api.fontshare.com/v2/css?f[]=supreme@400&f[]=technor@600&f[]=archivo@400&f[]=clash-display@600&f[]=clash-grotesk@400,600&display=swap" rel="stylesheet">
    <title>Kork Sombot</title>
</head>
<body>
    <div class="panel-left">
       <img class="bg-photo"
       src="https://images.unsplash.com/photo-1563841930606-67e2bce48b78?q=80&w=736&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
       alt="Concert crowd">
       
       <a href="home.html" class="logo">
            <div class="logo-icon">
                <i class="fa-solid fa-microphone"></i> 
            </div>
            <span class="logo-name">Kork Sombot </span>   
        </a>
        
        <!-- Hero Copy -->
        <div class="hero-copy">
            <h2>Cambodia's events.<br>Your Platform</h2>
            <p>Discover the best events in Cambodia and stay up-to-date with the latest happenings. From concerts to festivals, we've got you covered.</p>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="panel-right">
        <div class="signup-box">
            <h1>Join Kork Sombot</h1>
            <p class="signup-text">Create an account to access exclusive features and never miss an event.</p>
            <form id="signup-form" novalidate>
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                

                

            </form>
        </div>
        
    </div>
</html>
