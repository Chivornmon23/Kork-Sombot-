<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./sign_up.css">
    <link href="https://api.fontshare.com/v2/css?f[]=supreme@400&f[]=technor@600&f[]=archivo@400&f[]=clash-display@600&f[]=clash-grotesk@400,600&display=swap" rel="stylesheet">
    <title>Kork Sombot</title>
</head>
<body>
    <!--Left Panel-->
    <div class="panel-left">
       <div class="logo">
                <div class="logo-container">
                     <i class="fa-solid fa-ticket"></i>
                </div>
                <h1>KORK SOMBOT</h1>
            </div>
        <!-- Hero Copy -->
        <div class="hero-copy">
            <h2>Cambodia's events.<br>Your Platform</h2>
            <p>Discover the best events in Cambodia and stay up-to-date with the latest happenings. From concerts to festivals, we've got you covered.</p>
        </div>
    </div>

    <!-- Right Panel -->
    <div class="panel-right">
        <div class="signup-box">
            <h1>Join Kork Sombot</h1>
            <p class="signup-text">Create an account to access exclusive features and never miss an event.</p>
            <form id="signup-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="signup-button">Sign Up</button>
                

            </form>
        </div>
        
    </div>
</html>
